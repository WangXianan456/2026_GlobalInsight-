apiVersion: v1
kind: Namespace
metadata:
  name: global-insight
---
# 可添加 RBAC 权限（Flink 访问 K8s API）
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-service-account
  namespace: global-insight
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: global-insight
  name: flink-role
rules:
- apiGroups: ["", "apps", "batch", "extensions"]
  resources: ["pods", "services", "configmaps", "secrets", "deployments", "jobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: global-insight
  name: flink-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-role
subjects:
- kind: ServiceAccount
  name: flink-service-account
  namespace: global-insight

